<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أَبَا الْقَاسِم - إنشاء حساب</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/shared.css">

    <style>
        /* تطبيق خط Amiri وتنسيق اللوجو على اليمين */
        body, h2, label, input, button, span, a, p, div {
            font-family: 'Amiri', serif !important;
        }

    </style>
</head>

<body class="login-page">

    <div class="top-right-logo">أَصَالَة</div>

    <nav class="navbar">
        <div class="nav-header">
            <button class="menu-btn" id="menuBtn">☰</button>
        </div>
        <div class="nav-links" id="navLinks">
            <a href="Home.html">الرئيسية</a>
            <a href="product1.html">المنتجات</a>
            <a href="contact.html">اتصل بنا</a>
        </div>
    </nav>

    <main class="login-container">
        <div class="login-card">

            <h2>إنشاء حساب</h2>
            <p class="subtitle">انضم إلى عالم الروائح الفاخرة والتراث الخالد لـ أَبَا الْقَاسِم</p>

            <form id="registerForm">
                <div class="input-group">
                    <label for="fullName">الاسم الكامل</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="fullName" placeholder="أدخل اسمك الكريم" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">البريد الإلكتروني أو رقم الهاتف</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="text" id="email" placeholder="example@domain.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">كلمة المرور</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">تأكيد كلمة المرور</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>النوع</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="gender" value="male"> ذكر
                        </label>
                        <label>
                            <input type="radio" name="gender" value="female"> أنثى
                        </label>
                    </div>
                </div>

                <div class="terms-container">
                    <label class="checkbox-label">
                        <input type="checkbox" id="termsCheckbox">
                        أوافق على الشروط والأحكام وسياسة الخصوصية
                    </label>
                </div>

                <button type="submit" id="submitBtn" class="login-btn disabled" disabled>
                    تسجيل
                </button>
            </form>

            <div class="separator">OR</div>
            
            <div class="register-link">
                <span>لديك حساب بالفعل؟</span>
                <a href="login.html">تسجيل الدخول</a>
            </div>

        </div>
    </main>

    <footer class="footer">
        <p>ABA AL-QASIM HERITAGE PARFUMERIE</p>
        <p>© 2026 أَبَا الْقَاسِم للعطور جميع الحقوق محفوظة</p>
    </footer>

    <script src="../JS/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPortal | University LMS Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0f766e;
            --primary-dark: #0d625b;
            --primary-light: #14b8a6;
            --accent: #f59e0b;
            --danger: #ef4444;
            --success: #22c55e;
            --dark: #1e293b;
            --gray: #64748b;
            --light: #f8fafc;
            --white: #ffffff;
            --shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0fdfa 0%, #e6f0fa 50%, #f8fafc 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Background Pattern */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(15, 118, 110, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(20, 184, 166, 0.05) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        /* Main Container */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        /* Branding */
        .brand-section {
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            font-size: 36px;
            color: white;
            box-shadow: 0 10px 30px rgba(15, 118, 110, 0.3);
            transform: rotate(-5deg);
            transition: 0.3s ease;
        }

        .brand-logo:hover {
            transform: rotate(0deg) scale(1.05);
        }

        .brand-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .brand-title span {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-subtitle {
            font-size: 1.1rem;
            color: var(--gray);
            font-weight: 400;
        }

        /* Role Selection Grid */
        .role-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            width: 100%;
            animation: fadeInUp 0.8s ease-out;
        }

        .role-card {
            background: var(--white);
            border-radius: 20px;
            padding: 35px 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .role-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .role-card:hover::before {
            transform: scaleX(1);
        }

        .role-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-light);
        }

        .role-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 30px;
            transition: 0.3s ease;
        }

        .role-card:nth-child(1) .role-icon {
            background: #dcfce7;
            color: #16a34a;
        }

        .role-card:nth-child(2) .role-icon {
            background: #dbeafe;
            color: #2563eb;
        }

        .role-card:nth-child(3) .role-icon {
            background: #fef3c7;
            color: #d97706;
        }

        .role-card:nth-child(4) .role-icon {
            background: #ede9fe;
            color: #7c3aed;
        }

        .role-card h3 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .role-card p {
            font-size: 0.85rem;
            color: var(--gray);
            font-weight: 400;
        }

        /* Login Form Container */
        .login-container {
            background: var(--white);
            border-radius: 24px;
            padding: 45px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-lg);
            display: none;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f0fdfa;
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .login-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 5px;
        }

        .login-header p {
            color: var(--gray);
            font-size: 0.9rem;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 20px;
            padding: 8px 12px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: #f0fdfa;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 1rem;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: 0.3s;
            background: #f8fafc;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
        }

        .error-message {
            display: none;
            background: #fff5f5;
            color: var(--danger);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #fecaca;
            font-size: 0.9rem;
            animation: shake 0.5s ease;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(15, 118, 110, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.3px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(15, 118, 110, 0.3);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-bottom-color: white;
            border-radius: 50%;
            display: none;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Quick Links */
        .quick-links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--gray);
        }

        .quick-links span {
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
        }

        .quick-links span:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .brand-title {
                font-size: 1.8rem;
            }

            .role-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .role-card {
                padding: 25px 15px;
            }

            .login-container {
                padding: 30px 20px;
            }
        }

        @media (max-width: 480px) {
            .role-grid {
                grid-template-columns: 1fr;
            }
        }

        .brand-logo {
    width: 100px;
    height: 100px;
    background: white;
    border-radius: 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto 20px;
    box-shadow: 0 10px 30px rgba(15, 118, 110, 0.25);
    transition: 0.3s ease;
    overflow: hidden;
    padding: 8px;
}

.brand-logo:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 40px rgba(15, 118, 110, 0.35);
}

.brand-logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}
    </style>
</head>
<body>

    <div class="login-wrapper">
        <!-- Branding -->
      <div class="brand-section" id="brandSection">
    <div class="brand-logo">
        <img src="../images/Logo.png" 
             alt="EduPortal Logo" 
             style="width: 100%; height: 100%; object-fit: contain; border-radius: 16px;">
    </div>
    <h1 class="brand-title">Edu<span>Portal</span></h1>
    <p class="brand-subtitle">University Learning Management System</p>
</div>

        <!-- Role Selection -->
        <div class="role-grid" id="roleGrid">
            <div class="role-card" onclick="showLoginForm('student')">
                <div class="role-icon">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <h3>Student Portal</h3>
                <p>Access courses, grades & materials</p>
            </div>

            <div class="role-card" onclick="showLoginForm('doctor')">
                <div class="role-icon">
                    <i class="fas fa-chalkboard-teacher"></i>
                </div>
                <h3>Faculty Portal</h3>
                <p>Manage courses & student records</p>
            </div>

            <div class="role-card" onclick="showLoginForm('advisor')">
                <div class="role-icon">
                    <i class="fas fa-user-tie"></i>
                </div>
                <h3>Advisor Portal</h3>
                <p>Student guidance & enrollment</p>
            </div>

            <div class="role-card" onclick="showLoginForm('admin')">
                <div class="role-icon">
                    <i class="fas fa-shield-haltered"></i>
                </div>
                <h3>Admin Panel</h3>
                <p>System management & control</p>
            </div>
        </div>

        <!-- Login Form -->
        <div class="login-container" id="loginContainer">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i> Back to selection
            </button>

            <div class="login-header">
                <div class="role-badge" id="roleBadge">
                    <i class="fas fa-user-graduate"></i>
                    <span id="roleBadgeText">Student</span>
                </div>
                <h2 id="loginTitle">Student Login</h2>
                <p>Enter your credentials to continue</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="name@university.com" 
                            required 
                            autocomplete="email"
                        />
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="••••••••" 
                            required 
                            autocomplete="current-password"
                        />
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span id="btnText">Sign In</span>
                    <div class="loader" id="btnLoader"></div>
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        let currentRole = '';

        // ==================== ROLE ICONS ====================
        const roleIcons = {
            student: 'fa-user-graduate',
            doctor: 'fa-chalkboard-teacher',
            advisor: 'fa-user-tie',
            admin: 'fa-shield-haltered'
        };

        // ==================== SHOW LOGIN FORM ====================
        function showLoginForm(role) {
            currentRole = role;
            
            // Hide role grid and branding
            document.getElementById('roleGrid').style.display = 'none';
            document.getElementById('brandSection').style.display = 'none';
            
            // Show login container
            const loginContainer = document.getElementById('loginContainer');
            loginContainer.style.display = 'block';
            
            // Update UI based on role
            document.getElementById('loginTitle').textContent = 
                role.charAt(0).toUpperCase() + role.slice(1) + ' Login';
            
            document.getElementById('roleBadgeText').textContent = 
                role.charAt(0).toUpperCase() + role.slice(1);
            
            // Update role badge icon
            const badgeIcon = document.querySelector('#roleBadge i');
            badgeIcon.className = 'fas ' + roleIcons[role];
            
            // Update badge color
            const badge = document.getElementById('roleBadge');
            badge.style.background = role === 'student' ? '#dcfce7' : 
                                      role === 'doctor' ? '#dbeafe' : 
                                      role === 'advisor' ? '#fef3c7' : '#ede9fe';
            badge.style.color = role === 'student' ? '#16a34a' : 
                                  role === 'doctor' ? '#2563eb' : 
                                  role === 'advisor' ? '#d97706' : '#7c3aed';
            
            // Clear form
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            
            // Focus on email
            setTimeout(() => document.getElementById('email').focus(), 300);
        }

        // ==================== GO BACK ====================
        function goBack() {
            document.getElementById('roleGrid').style.display = 'grid';
            document.getElementById('brandSection').style.display = 'block';
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
            currentRole = '';
        }

        // ==================== HANDLE LOGIN ====================
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            const errorDiv = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');

            // Reset UI
            errorDiv.style.display = 'none';
            loginBtn.disabled = true;
            btnText.textContent = 'Authenticating...';
            btnLoader.style.display = 'inline-block';

            try {
                console.log('🔐 Login attempt:', { email, role: currentRole });

                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                console.log('📦 Login response:', data);

                // Check success
                if (!data.success) {
                    throw new Error(data.message || 'Invalid email or password');
                }

                // Role verification
                if (data.user.role !== currentRole) {
                    throw new Error(
                        `This account is registered as <strong>${data.user.role}</strong>.\n` +
                        `Please use the ${data.user.role} portal instead.`
                    );
                }

                // Save user data
                localStorage.setItem('user', JSON.stringify(data.user));
                
                if (data.token) {
                    localStorage.setItem('token', data.token);
                }

                // Success feedback
                btnText.textContent = '✓ Access Granted';
                btnLoader.style.display = 'none';
                loginBtn.style.background = 'var(--success)';

                // Redirect after delay
                setTimeout(() => {
                    const role = data.user.role;
                    window.location.href = `/views/${role}-dashboard.html`;
                }, 600);

            } catch (error) {
                console.error('❌ Login error:', error);
                
                // Show error
                errorDiv.innerHTML = error.message;
                errorDiv.style.display = 'block';
                
                // Reset button
                loginBtn.disabled = false;
                btnText.textContent = 'Sign In';
                btnLoader.style.display = 'none';
                
                // Shake animation
                errorDiv.style.animation = 'none';
                errorDiv.offsetHeight; // Trigger reflow
                errorDiv.style.animation = 'shake 0.5s ease';
            }
        });

        // ==================== KEYBOARD SHORTCUT ====================
        document.addEventListener('keydown', function(e) {
            // Press Escape to go back
            if (e.key === 'Escape' && document.getElementById('loginContainer').style.display === 'block') {
                goBack();
            }
        });
    </script>
</body>
</html>
